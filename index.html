<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <div class="title">Challenge</div>
          <div class="subtitle">주제별 방 선택 · 사진 인증</div>
        </div>
      </div>
      <span class="pill" id="statusPill">오프라인</span>
    </div>

    <div class="card">
      <p class="section-title">로비</p>
      <h1 class="big" id="headline">오늘도 인증합시다.</h1>
      <p class="desc" id="subline">대기 중인 방을 골라 입장하거나 새 방을 만들어 시작하세요.</p>

      <div class="row">
        <button class="btn primary" id="loginBtn">Google로 로그인</button>
        <button class="btn ghost" id="logoutBtn" style="display:none;">로그아웃</button>

        <button class="btn ghost" id="goGroupBtn" style="display:none;">내 그룹으로 가기</button>
      </div>

      <div id="roomCreateBox" style="margin-top:12px; display:none;">
        <p class="section-title" style="margin-bottom:8px;">방 만들기</p>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
          <input id="roomTitleInput" placeholder="방 이름" maxlength="30" style="flex:1; padding:10px 12px; border-radius:12px; border:1px solid #3a3f55; background:#0f172a; color:white;" />
          <input id="roomTopicInput" placeholder="주제" maxlength="40" style="flex:1; padding:10px 12px; border-radius:12px; border:1px solid #3a3f55; background:#0f172a; color:white;" />
        </div>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
          <select id="roomPrivacySelect" style="padding:10px 12px; border-radius:12px; border:1px solid #3a3f55; background:#0f172a; color:white;">
            <option value="public">공개방</option>
            <option value="private">비공개방(비밀번호)</option>
          </select>
          <input
            id="roomPasswordInput"
            placeholder="비밀번호 (비공개방)"
            maxlength="20"
            style="flex:1; padding:10px 12px; border-radius:12px; border:1px solid #3a3f55; background:#0f172a; color:white;"
          />
          <button id="createRoomBtn" class="btn ghost" style="width:auto; padding:10px 14px; border-radius:12px;">
            방 생성
          </button>
        </div>
        <div class="pill" id="myRoomPill" style="display:none;"></div>
      </div>

      <div id="roomListBox" style="margin-top:12px; display:none;">
        <p class="section-title" style="margin-bottom:8px;">대기실 목록</p>
        <ul class="list" id="roomList"></ul>
      </div>

      <div class="profile" id="profileBox" style="display:none;">
        <div class="avatar" id="avatarBox"></div>
        <div style="min-width:0;">
          <div class="name" id="userName">-</div>
          <div class="mail" id="userMail">-</div>
        </div>
      </div>

      <div id="nicknameBox" style="margin-top:12px; display:flex; gap:8px;">
        <input
          id="nicknameInput"
          placeholder="닉네임 (2~10자)"
          maxlength="10"
          style="flex:1; padding:10px 12px; border-radius:12px; border:1px solid #3a3f55; background:#0f172a; color:white;"
        />
        <button id="saveNickBtn" class="btn ghost" style="width:auto; padding:10px 14px; border-radius:12px;">
          닉네임 저장
        </button>
      </div>

      <p class="notice">
        ⚠️ 카카오톡 인앱 브라우저에서는 로그인/업로드가 불안정할 수 있어요. 가능하면 Safari/Chrome으로 열어주세요.
      </p>
    </div>
  </div>

  <script type="module" src="app.js?v=20260312c"></script>

  </body>
</html>
