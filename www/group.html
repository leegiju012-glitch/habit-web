<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 그룹</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="photoModal" class="photo-modal" style="display:none;">
    <div class="photo-back" id="photoBack"></div>
    <img id="photoViewer" class="photo-viewer" />
  </div>

  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <div class="title">내 그룹</div>
          <div class="subtitle" id="groupSub">오늘 인증 현황</div>
        </div>
      </div>
      <button class="btn ghost" id="backBtn" style="width:auto; padding:10px 12px; border-radius:12px;">로비</button>
    </div>

    <div class="card">
      <p class="section-title">상태</p>
      <div class="pill" id="status">불러오는 중...</div>

      <div class="file">
        <div class="section-title" style="margin:0 0 8px;">오늘 인증 사진</div>
        <input type="file" id="fileInput" accept="image/*" />
      </div>

      <div class="row">
        <button class="btn success" id="checkinBtn">오늘 인증하기</button>
        <button class="btn ghost" id="ownerActionBtn" style="display:none;">챌린지 시작</button>
        <button id="leaveGroupBtn" class="danger-btn">그룹 나가기</button>      
      </div>

      <ul class="list" id="members"></ul>

      <p class="notice">
        ⭕ 인증 완료 · ⏳ 아직 시간 남음 · ❌ 마감 후 미이행
      </p>
    </div>
  </div>

  <script type="module" src="group.js?v=20260311g"></script>
</body>
</html>
