<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 그룹</title>
  <link rel="stylesheet" href="style.css?v=20260312a" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
<body>
  <div id="photoModal" class="photo-modal" style="display:none;">
    <div class="photo-back" id="photoBack"></div>
    <img id="photoViewer" class="photo-viewer" />
  </div>

  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div>
          <div class="title">내 그룹</div>
          <div class="subtitle" id="groupSub">오늘 인증 현황</div>
        </div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn ghost compact" id="goProfileBtn">프로필</button>
        <button class="btn ghost compact" id="backBtn">로비</button>
      </div>
    </div>

    <div class="card">
      <p class="section-title">상태</p>
      <div class="pill" id="status">불러오는 중...</div>

      <div class="file">
        <div class="section-title" style="margin:0 0 8px;">오늘 인증 사진</div>
        <input type="file" id="fileInput" accept="image/*" />
      </div>

      <div class="row">
        <button class="btn success" id="checkinBtn">오늘 인증하기</button>
        <button class="btn ghost" id="ownerActionBtn" style="display:none;">챌린지 시작</button>
        <button class="btn danger" id="ownerDissolveBtn" style="display:none;">방 해산</button>
        <button id="leaveGroupBtn" class="danger-btn">그룹 나가기</button>      
      </div>

      <ul class="list" id="members"></ul>

      <p class="notice">
        ⭕ 승인 완료 · 🟡 검토중 · ❌ 반려/미인증
      </p>
    </div>
  </div>

  <script type="module" src="group.js?v=20260312k"></script>
</body>
</html>
