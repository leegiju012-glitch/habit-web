<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로비</title>

  <link rel="stylesheet" href="style.css?v=20260313b" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div class="container">
    <div class="card lobby-card">
      <p class="section-title lobby-title">로비</p>

      <div class="row" id="loginRow">
        <button class="btn primary" id="loginBtn">Google로 로그인</button>
      </div>

      <div id="roomActionBox" class="panel-block mode-actions" style="display:none; flex-direction:column;">
        <button id="enterRoomBtn" class="btn compact lobby-action" style="width:100%;">방 참가</button>
        <button id="openCreateRoomBtn" class="btn compact lobby-action" style="width:100%;">방 만들기</button>
      </div>

      <div id="roomCreateBox" class="panel-block" style="display:none;">
        <p class="section-title" style="margin-bottom:8px;">방 만들기</p>
        <div class="input-row">
          <input id="roomTitleInput" class="field" placeholder="방 이름" maxlength="30" />
          <input id="roomTopicInput" class="field" placeholder="주제" maxlength="40" />
        </div>
        <div class="input-row">
          <input id="roomRuleInput" class="field" placeholder="인증 사진 규칙 (예: 오늘 운동화 신고 거울샷)" maxlength="120" />
        </div>
        <div class="input-row">
          <select id="roomPrivacySelect" class="field select-field">
            <option value="public">공개방</option>
            <option value="private">비공개방(비밀번호)</option>
          </select>
          <input
            id="roomPasswordInput"
            class="field"
            placeholder="비밀번호 (비공개방)"
            maxlength="20"
            style="display:none;"
          />
          <button id="createRoomBtn" class="btn ghost compact">
            생성
          </button>
        </div>
      </div>

      <div class="panel-block" id="myRoomSection" style="display:none;">
        <p class="section-title" style="margin-bottom:8px;">내 방 목록</p>
        <ul class="list" id="myRoomList"></ul>
      </div>

      <div class="profile" id="profileBox" style="display:none;">
        <div class="avatar" id="avatarBox"></div>
        <div style="min-width:0;">
          <div class="name" id="userName">-</div>
          <div class="mail" id="userMail">-</div>
        </div>
        <button class="btn ghost compact profile-mini" id="goProfileBtn" style="display:none;">프로필</button>
        <button class="btn ghost compact profile-mini" id="logoutBtn" style="display:none;">로그아웃</button>
      </div>

      <p class="notice">
        ⚠️ 카카오톡 인앱 브라우저에서는 로그인/업로드가 불안정할 수 있어요. 가능하면 Safari/Chrome으로 열어주세요.
      </p>
    </div>
  </div>

  <script type="module" src="app.js?v=20260314c"></script>

  </body>
</html>
